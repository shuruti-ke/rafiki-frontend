services:
  - type: web
    name: rafiki-backend
    runtime: python
    region: virginia
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/ready
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rafiki-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: JWT_SECRET
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: rafiki-db
    plan: free
    region: virginia
